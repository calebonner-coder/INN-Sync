<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INN-Sync | Schedule Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --maroon: #6F263D; --navy: #041E42; }
        body { transition: background 0.3s; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; position: relative; }
        body.light { background: #f8fafc; color: #1e293b; }
        body.dark { background: #020617; color: #f8fafc; }

        .sidebar { position: absolute; z-index: 50; height: 100%; transition: transform 0.3s ease; transform: translateX(-100%); width: 300px; }
        .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.2); }
        @media (min-width: 1024px) { .sidebar { position: relative; transform: translateX(0); } #mobile-overlay { display: none !important; } }
        .sidebar.light { background: white; border-right: 1px solid #e2e8f0; }
        .sidebar.dark { background: #041E42; border-right: 1px solid #1e293b; color: white; }

        .status-free { border-top: 6px solid #10b981 !important; }
        .status-partial { border-top: 6px solid #f59e0b !important; }
        .status-busy { border-top: 6px solid #ef4444 !important; }

        .wing-badge { font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; color: white !important; }
        .light .wing-badge { background: var(--navy); }
        .dark .wing-badge { background: var(--maroon); }

        .ext-display { font-size: 1.5rem; font-weight: 400; font-style: italic; opacity: 0.8; }

        .block-pill:checked + span { background-color: var(--navy) !important; color: white !important; }
        .dark .block-pill:checked + span { background-color: var(--maroon) !important; }
        
        .search-input { width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; border: 1px solid #e2e8f0; }
        .light .search-input { background: white; color: #0f172a; }
        .dark .search-input { background: #0f172a; color: #f8fafc; border-color: #334155; }

        .dept-icon { width: 26px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 9px; font-weight: 900; color: white; }
    </style>
</head>
<body class="light">

    <div id="mobile-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/60 z-40"></div>

    <aside id="sidebar" class="sidebar light p-6 flex flex-col">
        <div class="flex justify-between items-start mb-8">
            <div>
                <div class="brand-main text-3xl font-black tracking-tighter"><span style="color: var(--maroon);">INN</span><span style="color: var(--navy);">-Sync</span></div>
                <div class="text-[10px] font-bold uppercase tracking-widest opacity-50">Schedule Viewer</div>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-2xl mt-2">✕</button>
        </div>

        <div class="space-y-4 mb-8">
            <button onclick="toggleDarkMode()" class="w-full py-2.5 px-4 rounded-lg border border-slate-300 text-[10px] font-black tracking-widest flex justify-between items-center uppercase">
                <span>Theme</span> <span id="theme-icon">🌙</span>
            </button>
            <div class="relative group">
                <input type="text" id="globalSearch" placeholder="Search Teacher..." class="search-input" oninput="render()">
            </div>
            <button onclick="resetAllFilters()" class="w-full py-3 bg-slate-900 text-white dark:bg-white dark:text-slate-900 rounded-xl text-[10px] font-black tracking-widest uppercase shadow-lg transition">
                Reset All Filters
            </button>
        </div>

        <div class="flex-1 overflow-y-auto pr-2">
            <div id="wingAccordion" class="space-y-2"></div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 lg:p-10">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="toggleSidebar()" class="lg:hidden p-3 bg-slate-200 dark:bg-slate-800 rounded-xl">☰</button>
            <div id="blockSelector" class="flex flex-1 gap-1 p-1.5 bg-slate-200 dark:bg-slate-800 rounded-2xl max-w-md"></div>
        </header>
        <div id="roomGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 2xl:grid-cols-5 gap-6"></div>
    </main>

    <script>
        let schoolData = [];
        let visibleRooms = new Set();
        let isDarkMode = false;
        const blocks = ["B1", "B2", "B3", "B4"];

        // Updated Department Codes & Colors
        const deptColors = {
            "AP": { bg: "#ec4899", label: "AP" }, // Performing Arts
            "AV": { bg: "#d946ef", label: "AV" }, // Visual Arts
            "B":  { bg: "#0ea5e9", label: "B" },  // Business
            "CTE":{ bg: "#f43f5e", label: "CTE"}, // CTE
            "E":  { bg: "#8b5cf6", label: "E" },  // English
            "H":  { bg: "#f59e0b", label: "H" },  // History
            "L":  { bg: "#14b8a6", label: "L" },  // Foreign Language
            "M":  { bg: "#3b82f6", label: "M" },  // Math
            "P":  { bg: "#64748b", label: "P" },  // PE
            "S":  { bg: "#10b981", label: "S" },  // Science
            "WL": { bg: "#f97316", label: "WL" }, // ESOL
            "SPE":{ bg: "#6366f1", label: "SPE"}, // SPED
            "Vacant": { bg: "#e2e8f0", label: "-" }
        };

        window.onload = function() {
            loadSchedule();
            const bCont = document.getElementById('blockSelector');
            blocks.forEach(b => { 
                bCont.innerHTML += `<label class="flex-1 text-center cursor-pointer"><input type="checkbox" value="${b}" class="hidden peer block-pill" checked onchange="render()"><span class="block py-2 rounded-xl text-[10px] font-black transition-all uppercase opacity-40 peer-checked:opacity-100">${b}</span></label>`; 
            });
        };

        async function loadSchedule() {
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error('Data file not found');
                const csvText = await response.text();
                processData(csvText);
            } catch (err) {
                document.getElementById('roomGrid').innerHTML = `<div class="col-span-full text-center p-20 opacity-50 font-bold">⚠️ Upload 'data.csv' to GitHub.</div>`;
            }
        }

        function processData(csvText) {
            const lines = csvText.split(/\r?\n/);
            schoolData = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const c = lines[i].split(',');
                // CSV Structure: Room, Wing, Ext, [T, CoT, C, D] x 4
                schoolData.push({
                    id: c[0], wing: c[1], ext: c[2],
                    schedule: {
                        B1: { t: c[3], cot: c[4], c: c[5], d: c[6] },
                        B2: { t: c[7], cot: c[8], c: c[9], d: c[10] },
                        B3: { t: c[11], cot: c[12], c: c[13], d: c[14] },
                        B4: { t: c[15], cot: c[16], c: c[17], d: c[18] }
                    }
                });
            }
            buildSidebar();
            resetAllFilters();
        }

        function render() {
            const grid = document.getElementById('roomGrid');
            const search = document.getElementById('globalSearch').value.toLowerCase();
            const activeBlocks = Array.from(document.querySelectorAll('.block-pill:checked')).map(c => c.value);
            grid.innerHTML = '';

            const filtered = schoolData.filter(r => {
                if (!visibleRooms.has(r.id)) return false;
                if (search === "") return true;
                // Search both Teacher (t) and Co-Teacher (cot)
                return activeBlocks.some(b => 
                    r.schedule[b].t.toLowerCase().includes(search) || 
                    (r.schedule[b].cot && r.schedule[b].cot.toLowerCase().includes(search))
                );
            });

            filtered.forEach(r => {
                const statusList = activeBlocks.map(b => r.schedule[b].t.toLowerCase());
                const allVacant = statusList.every(t => t === "vacant" || t === "");
                const allOccupied = statusList.every(t => t !== "vacant" && t !== "");
                let statusClass = allVacant ? 'status-free' : (allOccupied ? 'status-busy' : 'status-partial');

                const rows = activeBlocks.map(b => {
                    const block = r.schedule[b];
                    const isVac = block.t.toLowerCase() === 'vacant';
                    const dept = deptColors[block.d] || deptColors["Vacant"];
                    const coTeacherStr = block.cot ? ` / ${block.cot}` : '';
                    
                    return `
                    <div class="flex flex-col border-b border-slate-100 dark:border-slate-800 last:border-0 pb-3">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black opacity-30 uppercase">${b}</span>
                            <div class="dept-icon" style="background: ${dept.bg}">${dept.label}</div>
                        </div>
                        <div class="text-sm tracking-tight">
                            <span class="font-bold uppercase">${block.t}${coTeacherStr}</span>
                            <span class="italic font-normal ml-2 block sm:inline opacity-70">${block.c ? block.c : ''}</span>
                        </div>
                    </div>`}).join('');

                const card = document.createElement('div');
                card.className = `p-5 flex flex-col gap-4 transition-all ${isDarkMode ? 'bg-[#0f172a]' : 'bg-white'} ${statusClass} rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-2xl font-black tracking-tighter" style="color: ${isDarkMode ? '#f8fafc' : '#041E42'}">${r.id}</span>
                            <span class="wing-badge mt-1">${r.wing}</span>
                        </div>
                        <span class="ext-display">📞 ${r.ext.replace('x', '')}</span>
                    </div>
                    <div class="space-y-1">${rows}</div>`;
                grid.appendChild(card);
            });
        }

        function buildSidebar() {
            const container = document.getElementById('wingAccordion');
            container.innerHTML = '';
            const wings = [...new Set(schoolData.map(r => r.wing))];
            wings.forEach(w => {
                const wingRooms = schoolData.filter(r => r.wing === w);
                let roomHtml = wingRooms.map(r => `
                    <label class="flex items-center justify-between text-[11px] p-2.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer">
                        <span>Room ${r.id}</span>
                        <input type="checkbox" id="check-${r.id}" checked onchange="updateVisibility('${r.id}', this.checked)" class="accent-[#6F263D]">
                    </label>`).join('');
                container.innerHTML += `
                    <div class="rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 mb-2">
                        <div class="p-4 flex items-center justify-between font-bold text-[10px] tracking-widest bg-slate-50 dark:bg-slate-800/50">
                            <span class="cursor-pointer flex-1 uppercase" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden')">${w} Wing <span class="opacity-30 ml-2">▼</span></span>
                            <input type="checkbox" checked onchange="toggleAllInWing('${w}', this.checked)" class="accent-[#6F263D] w-4 h-4">
                        </div>
                        <div class="p-1 space-y-0.5 bg-white dark:bg-slate-900/30 hidden">${roomHtml}</div>
                    </div>`;
            });
        }
        function resetAllFilters() { visibleRooms = new Set(schoolData.map(r => r.id)); document.querySelectorAll('.block-pill').forEach(p => p.checked = true); document.querySelectorAll('#wingAccordion input[type="checkbox"]').forEach(c => (c.checked = true)); render(); }
        function toggleDarkMode() { isDarkMode = !isDarkMode; document.body.className = isDarkMode ? 'dark' : 'light'; document.getElementById('sidebar').className = `sidebar ${isDarkMode ? 'dark' : 'light'} p-6 flex flex-col`; render(); }
        function toggleAllInWing(wingName, isChecked) { schoolData.filter(r => r.wing === wingName).forEach(r => { isChecked ? visibleRooms.add(r.id) : visibleRooms.delete(r.id); if(document.getElementById(`check-${r.id}`)) document.getElementById(`check-${r.id}`).checked = isChecked; }); render(); }
        function updateVisibility(id, v) { v ? visibleRooms.add(id) : visibleRooms.delete(id); render(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }
    </script>
</body>
</html>
